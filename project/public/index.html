<script>
  let viewer; 
  let isSpinning = true; 

  setTimeout(() => {
    viewer = $3Dmol.createViewer("viewer");
      viewer.setBackgroundColor(0x000000, 0); // أبيض + شفاف

    $3Dmol.download("pdb:1CRN", viewer, {}, function() {
      viewer.setStyle({}, {
        line: { scale: 0.3, outline: { color: 'black', width: 0.05 } }, 
        stick: { radius: 0.15, outline: { color: 'black', width: 0.05 } }
      });
      viewer.zoomTo();
      viewer.spin("y", 0.5);
      viewer.render();
    });
  }, 500); // تأخير نصف ثانية مثلاً

  // التحكم بالكيبورد
  document.addEventListener('keydown', function(e) {
    if (e.key.toLowerCase() === 's') {
      if (isSpinning) {
        viewer.spin(false); 
      } else {
        viewer.spin("y", 0.5); 
      }
      isSpinning = !isSpinning; 
    }
  });

</script>
